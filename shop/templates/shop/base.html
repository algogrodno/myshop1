{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин техники{% endblock %}</title>

    <!-- BASE CSS -->
    <!-- <link rel="stylesheet" href="{% static 'css/variables.css' %}"> -->
    <link rel="stylesheet" href="{% static 'css/base2.css' %}">
    <!-- <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidenav.css' %}"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header">
        {% include 'shop/includes/topbar.html' %}
    </header>

    <!-- MAIN LAYOUT -->
    <div class="site-layout">
        <aside class="site-sidenav">
            {% include 'shop/includes/sidenav.html' %}
        </aside>

        <main class="site-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-grid">
            <div>
                <h4>О магазине</h4>
                <p>Магазин техники и электроники</p>
            </div>
            <div>
                <h4>Контакты</h4>
                <p>support@shop.ru</p>
            </div>
        </div>
    </footer>

    <!-- JS -->
    <script src="{% static 'js/nav.js' %}"></script>
    <script src="{% static 'js/ui.js' %}"></script>
    <script>
    function toggleSidenav() {
        const sidenav = document.querySelector('.site-sidenav');
        const overlay = document.querySelector('.mobile-overlay') || createOverlay();
        const body = document.body;
        
        sidenav.classList.toggle('open');
        overlay.classList.toggle('active');
        body.classList.toggle('menu-open');
      }
      
      function createOverlay() {
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        overlay.onclick = toggleSidenav;
        document.body.appendChild(overlay);
        return overlay;
      }
      
      // Закрытие по ESC
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          document.querySelector('.site-sidenav')?.classList.remove('open');
          document.querySelector('.mobile-overlay')?.classList.remove('active');
          document.body.classList.remove('menu-open');
        }
      });
      
      // Закрытие при клике вне меню
      document.addEventListener('click', function(e) {
        const sidenav = document.querySelector('.site-sidenav');
        const btn = document.querySelector('.mobile-menu-btn');
        if (sidenav.classList.contains('open') && 
            !sidenav.contains(e.target) && 
            !btn.contains(e.target)) {
          toggleSidenav();
        }
      });
    </script>
</body>
</html>
